<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineAI - Premium</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #050505; --card: #121212; }
        
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* TELA 1: GRADE DE CANAIS */
        #home-screen { padding: 20px; display: block; }
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #222; margin-bottom: 30px; }
        .header h1 { font-size: 24px; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        
        .channel-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: 0.3s; border: 1px solid #222; text-align: center; padding-bottom: 10px;
        }
        .channel-card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }
        .channel-card img { width: 100%; height: 180px; object-fit: cover; background: #1a1a1a; }
        .channel-card h4 { margin: 10px 5px 2px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-card span { font-size: 10px; color: #888; text-transform: uppercase; }

        /* TELA 2: PLAYER FULLSCREEN */
        #player-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999; flex-direction: column;
        }
        .back-btn { 
            position: absolute; top: 20px; left: 20px; z-index: 1001;
            background: rgba(0,0,0,0.6); border: 1px solid #fff; color: white;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .video-container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .video-js { width: 100% !important; height: 100% !important; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="header">
        <h1>CINE<span style="color:var(--primary)">AI</span> PREMIUM</h1>
    </div>
    <div class="grid" id="lista-canais">
        <p style="text-align: center; grid-column: 1/-1;">Carregando canais...</p>
    </div>
</div>

<div id="player-screen">
    <button class="back-btn" onclick="fecharPlayer()">❮ VOLTAR</button>
    <div class="video-container">
        <video id="main-video" class="video-js vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">Erro ao carregar vídeo.</p>
        </video>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    const player = videojs('main-video');
    
    // IMPORTANTE: Coloque o link direto do seu arquivo canais.json no GitHub (Raw)
    const JSON_URL = 'canais.json'; 

    async function carregarCanais() {
        try {
            const response = await fetch(JSON_URL);
            const canais = await response.json();
            const container = document.getElementById('lista-canais');
            
            container.innerHTML = canais.map(item => `
                <div class="channel-card" onclick="abrirPlayer('${item.url}')">
                    <img src="${item.logo}" onerror="this.src='https://via.placeholder.com/150x200?text=Sem+Logo'">
                    <span>${item.categoria}</span>
                    <h4>${item.nome}</h4>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('lista-canais').innerHTML = "<p>Erro ao carregar lista de canais.</p>";
        }
    }

    function abrirPlayer(url) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'flex';
        
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
    }

    function fecharPlayer() {
        player.pause();
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    // Inicia o app buscando os dados
    carregarCanais();
</script>

</body>
</html>
