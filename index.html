<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CineAI - Premium (HLS Fix)</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #050505; --card: #121212; --success: #28a745; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        #home-screen { padding: 20px; display: block; }
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #222; margin-bottom: 30px; }
        .header h1 { font-size: 24px; letter-spacing: 2px; margin: 0; font-weight: 700; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        
        .channel-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: 0.3s; border: 1px solid #222; text-align: center; padding-bottom: 10px;
        }
        .channel-card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }
        .channel-card img { width: 100%; height: 160px; object-fit: cover; background: #1a1a1a; display: block; }
        .channel-card h4 { margin: 10px 5px 2px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-card span { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; }

        #player-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999; flex-direction: column;
        }
        .back-btn { 
            position: absolute; top: 20px; left: 20px; z-index: 1001;
            background: rgba(0,0,0,0.7); border: 1px solid #fff; color: white;
            padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .video-container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: black; }
        
        .video-js { width: 100% !important; height: 100% !important; }

        .btn-panic {
            display: none; position: absolute; left: 50%; transform: translateX(-50%);
            z-index: 1002; color: white; text-decoration: none;
            padding: 15px 25px; border-radius: 8px; font-weight: bold; text-align: center;
            width: 85%; max-width: 320px; border: none; cursor: pointer; font-size: 14px;
        }
        #error-link { bottom: 30%; background: var(--primary); box-shadow: 0 4px 15px rgba(229, 9, 20, 0.5); }
        #vlc-btn { bottom: 15%; background: var(--success); box-shadow: 0 4px 15px rgba(40, 167, 69, 0.5); }
        .error-msg { position: absolute; bottom: 45%; left: 0; right: 0; text-align: center; color: #ff8888; background: rgba(0,0,0,0.7); padding: 8px; z-index: 1002; font-size: 12px; display: none; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="header">
        <h1>CINE<span style="color:var(--primary)">AI</span> PREMIUM</h1>
    </div>
    <div class="grid" id="lista-canais">
        <p style="text-align: center; grid-column: 1/-1;">Buscando canais...</p>
    </div>
</div>

<div id="player-screen">
    <button class="back-btn" onclick="fecharPlayer()">❮ VOLTAR</button>
    
    <a id="error-link" class="btn-panic" target="_blank">🔗 LINK DIRETO (ABRIR NO NAVEGADOR)</a>
    <button id="vlc-btn" class="btn-panic" onclick="abrirExterno()">🎬 ABRIR NO VLC (EXTERNO)</button>
    <div id="player-error-msg" class="error-msg"></div>

    <div class="video-container">
        <video id="main-video" class="video-js vjs-big-play-centered" controls preload="auto" crossorigin="anonymous">
            <p class="vjs-no-js">Seu navegador não suporta este player.</p>
        </video>
    </div>
</div>

<!-- Scripts: video.js + hls.js para compatibilidade total com Chromium -->
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    const videoElement = document.getElementById('main-video');
    let player = null;
    let hlsInstance = null;
    let currentUrl = '';

    // Inicializa o player video.js com configurações básicas
    function initPlayer() {
        if (player) {
            player.dispose();
        }
        player = videojs(videoElement, {
            controls: true,
            autoplay: false,
            preload: 'auto',
            fluid: true,
            html5: {
                hls: {
                    enableLowInitialPlaylist: true,
                    smoothQualityChange: true
                }
            }
        });
        return player;
    }

    // Função principal para carregar HLS usando hls.js (Chromium) ou nativo (Safari)
    function carregarStream(url) {
        currentUrl = url;
        
        // Esconde mensagens de erro e botões
        document.getElementById('error-link').style.display = 'none';
        document.getElementById('vlc-btn').style.display = 'none';
        document.getElementById('player-error-msg').style.display = 'none';
        
        // Se já existe uma instância hls, destrói
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        
        // Verifica se o navegador suporta HLS nativamente (Safari, Edge antigo)
        if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            // Navegador com suporte nativo (Safari)
            console.log("Usando HLS nativo");
            player.src({ src: url, type: 'application/vnd.apple.mpegurl' });
            player.play().catch(e => mostrarErro("Autoplay bloqueado. Clique no play."));
        } 
        else if (Hls.isSupported()) {
            // Chromium, Firefox, etc: usa hls.js
            console.log("Usando hls.js para reprodução");
            hlsInstance = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                maxLoadingDelay: 4,
                startPosition: -1
            });
            
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoElement);
            
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                player.play().catch(e => console.warn("Autoplay bloqueado:", e));
            });
            
            hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            mostrarErro("Erro de rede. Verifique sua conexão.");
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            mostrarErro("Erro no formato do vídeo. Tente outro canal.");
                            break;
                        default:
                            mostrarErro("Falha ao carregar o stream.");
                            break;
                    }
                    // Mostra botões de emergência
                    document.getElementById('error-link').style.display = 'block';
                    document.getElementById('vlc-btn').style.display = 'block';
                    document.getElementById('error-link').href = url;
                }
            });
        } 
        else {
            // Navegador muito antigo
            mostrarErro("Seu navegador não suporta reprodução de vídeo HLS.");
            document.getElementById('error-link').style.display = 'block';
            document.getElementById('vlc-btn').style.display = 'block';
            document.getElementById('error-link').href = url;
        }
    }
    
    function mostrarErro(mensagem) {
        const errorDiv = document.getElementById('player-error-msg');
        errorDiv.textContent = mensagem;
        errorDiv.style.display = 'block';
        console.error(mensagem);
    }

    // Carrega os canais do JSON
    async function carregarCanais() {
        const JSON_URL = 'canais.json'; 
        try {
            const response = await fetch(JSON_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error("HTTP " + response.status);
            const canais = await response.json();
            const container = document.getElementById('lista-canais');
            
            if (!canais.length) {
                container.innerHTML = "<p>Nenhum canal encontrado.</p>";
                return;
            }

            container.innerHTML = canais.map(item => `
                <div class="channel-card" onclick="abrirPlayer('${item.url}')">
                    <img src="${item.logo}" onerror="this.src='https://placehold.co/150x200?text=CineAI'">
                    <div style="padding: 5px;">
                        <span>${item.categoria}</span>
                        <h4>${item.nome}</h4>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('lista-canais').innerHTML = `<p>Erro ao carregar lista: ${e.message}. Verifique o arquivo canais.json.</p>`;
        }
    }

    // Abre player com o stream
    function abrirPlayer(url) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('player-screen').style.display = 'flex';
        
        // Reinicia o player video.js
        if (player) player.dispose();
        initPlayer();
        
        // Carrega o stream
        carregarStream(url);
    }

    // Fecha o player e libera recursos
    function fecharPlayer() {
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        if (player) {
            player.pause();
            player.dispose();
            player = null;
        }
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    // Abrir no VLC (Android) ou tenta protocolo vlc://
    function abrirExterno() {
        const url = currentUrl;
        if (!url) return;
        
        // Android: intent VLC
        if (/android/i.test(navigator.userAgent)) {
            const vlcIntent = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=http;type=video/*;package=org.videolan.vlc;end`;
            window.location.href = vlcIntent;
        } 
        // Desktop: tenta vlc://
        else {
            window.location.href = `vlc://${url}`;
        }
        // Fallback: copiar link
        setTimeout(() => {
            navigator.clipboard.writeText(url);
            alert("Link copiado! Cole no VLC ou outro player.");
        }, 500);
    }

    // Inicialização
    initPlayer(); // player vazio
    carregarCanais();
</script>

</body>
</html>
